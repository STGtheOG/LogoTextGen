name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    env:
      UV_PYTHON_PREFERENCE: only-system

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Run build script
        run: python build.py

      - name: Create zip archive
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            7z a logotextgen-${{ matrix.platform }}.zip ./dist/*
          else
            cd dist && zip -r ../logotextgen-${{ matrix.platform }}.zip . && cd ..
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: logotextgen-${{ matrix.platform }}
          path: logotextgen-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release tag
        id: release_info
        shell: bash
        run: |
          date=$(date +"%Y-%m-%d")
          hash=$(git rev-parse --short HEAD)
          release_name="${date}-${hash}"
          commit_msg=$(git log -1 --pretty=%B)
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "commit_msg<<EOF" >> "$GITHUB_OUTPUT"
          echo "${commit_msg}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Release name: ${release_name}"

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          readme=$(cat README.md)
          commit_msg="${{ steps.release_info.outputs.commit_msg }}"
          body="${readme}

          ---

          ${commit_msg}"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "${body}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_info.outputs.release_name }}
          name: ${{ steps.release_info.outputs.release_name }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            artifacts/logotextgen-windows/logotextgen-windows.zip
            artifacts/logotextgen-macos/logotextgen-macos.zip
            artifacts/logotextgen-linux/logotextgen-linux.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate index.html for GitHub Pages
        shell: bash
        run: |
          release_name="${{ steps.release_info.outputs.release_name }}"
          windows_url="https://github.com/STGtheOG/LogoTextGen/releases/download/${release_name}/logotextgen-windows.zip"
          macos_url="https://github.com/STGtheOG/LogoTextGen/releases/download/${release_name}/logotextgen-macos.zip"
          linux_url="https://github.com/STGtheOG/LogoTextGen/releases/download/${release_name}/logotextgen-linux.zip"
          mkdir -p _pages
          sed \
            -e "s|{{RELEASE_NAME}}|${release_name}|g" \
            -e "s|{{WINDOWS_DOWNLOAD_URL}}|${windows_url}|g" \
            -e "s|{{MACOS_DOWNLOAD_URL}}|${macos_url}|g" \
            -e "s|{{LINUX_DOWNLOAD_URL}}|${linux_url}|g" \
            index.html > _pages/index.html
          echo "Generated index.html with release: ${release_name}"

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_pages'

      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
