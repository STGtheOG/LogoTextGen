<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LogoTextGen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, avenir next, avenir, segoe ui, helvetica neue, Adwaita Sans, Cantarell, Ubuntu, roboto, noto, helvetica, arial, sans-serif;
        }

        html,
        body {
            height: 100%;
        }

        html {
            background: linear-gradient(90deg, rgba(82, 42, 155, 1) 0%, rgba(150, 103, 240, 1) 50%, rgba(82, 42, 155, 1) 100%);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin: 0 auto;
            padding: 2rem;
            max-width: 60ch;
            background-color: white;
            border-radius: 1rem;
            border: 2px solid #522a9b;
        }

        header {
            text-align: center;
        }

        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            20% {
                transform: rotate(-3deg);
            }

            40% {
                transform: rotate(3deg);
            }

            60% {
                transform: rotate(-3deg);
            }

            80% {
                transform: rotate(3deg);
            }
        }

        button {
            font-size: 1.2rem;
            padding: 0.5rem 1rem;
            background-color: #e8ddff;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #c4a5ff;
            animation: wiggle 0.5s ease-in-out;
        }

        .download-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>LogoTextGen</h1>
            <p>Mario Super Sluggers Logo & Texture Editor</p>
        </header>

        <p class="description">
            Generate custom team logos, scoreboards, and stadium textures for
            Mario Super Sluggers. Add your images to the Input folder and run
            the tool to get started!
        </p>

        <div class="download-section">
            <p><strong>Download {{RELEASE_NAME}}</strong></p>
            <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center;">
                <a href="{{WINDOWS_DOWNLOAD_URL}}" download>
                    <button>Windows</button>
                </a>
                <a href="{{MACOS_DOWNLOAD_URL}}" download>
                    <button>macOS</button>
                </a>
                <a href="{{LINUX_DOWNLOAD_URL}}" download>
                    <button>Linux</button>
                </a>
            </div>
            <p>
                <a href="https://github.com/STGtheOG/LogoTextGen/releases" class="releases-link">View all
                    releases</a>
            </p>
        </div>
    </div>
</body>

</html>
